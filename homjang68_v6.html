// ── IMAGE COMPRESS ────────────────────────────────────────────
async function compressImg(src,maxPx=400,q=0.7){
  return new Promise(resolve=>{
    function go(url){
      const img=new Image();
      img.onload=()=>{
        const sc=Math.min(1,maxPx/Math.max(img.width,img.height));
        const cv=document.createElement("canvas");
        cv.width=Math.floor(img.width*sc);
        cv.height=Math.floor(img.height*sc);
        cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
        resolve(cv.toDataURL("image/jpeg",q));
      };
      img.src=url;
    }
    if(src instanceof File){const rd=new FileReader();rd.onload=ev=>go(ev.target.result);rd.readAsDataURL(src);}
    else go(src);
  });
}

// ── PLANNING ──────────────────────────────────────────────────
function planWash(classes,s){
  const pool=[];
  ["W27","W18","W14","W9"].forEach(t=>{for(let i=0;i<(s[t]||0);i++)pool.push({t,n:i+1,cap:WC[t]});});
  if(!pool.length||!classes.length)return[];
  const loads=[];let wave=1;const q=classes.map(c=>({...c}));
  while(q.length>0){
    const slots=pool.map(m=>({id:"W"+wave+"-"+m.t+m.n,wave,m,cls:[],tot:0,rem:m.cap}));
    let si=0;
    while(q.length>0&&si<slots.length){
      const sl=slots[si];
      if(sl.rem===0){si++;continue;}
      const take=Math.min(sl.rem,q[0].count);
      sl.cls.push(Object.assign({},q[0],{count:take}));
      sl.tot+=take;sl.rem-=take;q[0].count-=take;
      if(q[0].count===0)q.shift();
    }
    loads.push(...slots.filter(sl=>sl.tot>0));
    wave++;
  }
  return loads;
}

function planDry(wl,s){
  const pool=[];
  ["D25","D14"].forEach(t=>{for(let i=0;i<(s[t]||0);i++)pool.push({t,n:i+1,cap:DC[t],mpb:DM[t]});});
  if(!pool.length)return[];
  const loads=[];
  const waves=[...new Set(wl.map(l=>l.wave))];
  waves.forEach(w=>{
    const items=[];
    wl.filter(l=>l.wave===w).forEach(wl2=>wl2.cls.forEach(c=>{for(let i=0;i<c.count;i++)items.push(c);}));
    let bi=0,di=0;
    while(bi<items.length){
      const dr=pool[di%pool.length];
      const batch=items.slice(bi,bi+dr.cap);
      const cm={};
      batch.forEach(c=>{cm[c.id]=cm[c.id]||{id:c.id,name:c.name,count:0};cm[c.id].count++;});
      loads.push({id:uid(),wave:w,dr,tot:batch.length,cls:Object.values(cm),dryMin:batch.length*dr.mpb});
      bi+=dr.cap;di++;
    }
  });
  return loads;
}

function planTime(total,wl,dl,s){
  const W=s.workers||3;
  const waves=wl.length?Math.max(...wl.map(l=>l.wave)):0;
  const mxW=wl.length?Math.max(...wl.map(l=>WT[l.m.t]||45)):45;
  const mxD=dl.length?Math.max(...dl.map(l=>l.dryMin)):0;
  const dW=dl.length?[...new Set(dl.map(l=>l.wave))].length:0;
  const rec=Math.max(10,Math.round(total*0.3/W));
  const wash=waves*mxW+Math.max(0,waves-1)*5;
  const fold=Math.ceil(total*(s.fmb||1.5)/W);
  const sort=Math.ceil(total/15)*4+10;
  const steps=[
    {n:"รับผ้า+ถ่ายรูป",ic:"🚛",min:rec,note:W+"คน",cum:rec},
    {n:"ใส่ผ้า+ซัก",ic:"🧺",min:wash,note:waves+"รอบ×"+mxW+"น.",cum:rec+wash},
    {n:"อบผ้า(Overlap)",ic:"💨",min:dW?mxD+(dW-1)*5:0,note:"ซ้อนทับ",cum:rec+wash},
    {n:"พับผ้า",ic:"👕",min:fold,note:total+"÷"+W+"คน",cum:rec+wash+fold},
    {n:"เรียงถุง+ขึ้นรถ",ic:"📦",min:sort,note:"Sequence ห้อง",cum:rec+wash+fold+sort},
  ];
  return{steps,totalMin:steps[steps.length-1].cum};
}

// ── TODAY ─────────────────────────────────────────────────────
function TodayScr({jobs,saveJobs,notify}){
  const active=jobs.filter(j=>j.status!=="delivered");
  function adv(id){
    const updated=jobs.map(j=>{
      if(j.id!==id)return j;
      const ni=SF.indexOf(j.status)+1;
      return ni<SF.length?Object.assign({},j,{status:SF[ni],upd:Date.now()}):j;
    });
    saveJobs(updated);
    const nj=updated.find(j=>j.id===id);
    notify(SI[nj.status]+" "+SL[nj.status]);
  }
  if(!active.length) return e("div",{style:{textAlign:"center",padding:"80px 20px"}},
    e("div",{style:{fontSize:72}},"🎉"),
    e("div",{style:{fontSize:22,fontWeight:700,marginTop:12,color:"#059669"}},"ไม่มีงานค้าง!")
  );
  return e("div",{style:{padding:16}},
    active.map(job=>{

          ),
          e("div",{style:{background:col,color:"white",borderRadius:12,padding:"5px 14px",fontSize:13,fontWeight:700}},SI[job.status]+" "+SL[job.status])
        ),
        e("div",{style:{background:"#f3f4f6",borderRadius:8,height:10,marginBottom:10,overflow:"hidden"}},
          e("div",{style:{height:"100%",background:col,borderRadius:8,width:pct+"%",transition:"width .5s"}})

// ── CAMERA MODAL ──────────────────────────────────────────────
function CameraModal({onCapture,onClose,name}){
  const vr=useRef(null);
  const sr=useRef(null);
  const [ready,setReady]=useState(false);
  const [err,setErr]=useState("");
  const [flash,setFlash]=useState(false);

  useEffect(()=>{
    let ok=true;
    if(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia){
      navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:"environment"},width:{ideal:1280}}})
        .then(stream=>{
          if(!ok){stream.getTracks().forEach(t=>t.stop());return;}
          sr.current=stream;
          if(vr.current){vr.current.srcObject=stream;vr.current.onloadedmetadata=()=>{vr.current.play();setReady(true);};}
        })
        .catch(err2=>setErr(err2.message||"ไม่สามารถเปิดกล้องได้"));
    } else {
      setErr("Browser ไม่รองรับ getUserMedia — ใช้ปุ่ม 📁 แทน");
    }
    return()=>{ok=false;if(sr.current)sr.current.getTracks().forEach(t=>t.stop());};
  },[]);

  async function snap(){
    if(!vr.current||!ready)return;
    setFlash(true);setTimeout(()=>setFlash(false),180);
    const cv=document.createElement("canvas");
    cv.width=vr.current.videoWidth;cv.height=vr.current.videoHeight;
    cv.getContext("2d").drawImage(vr.current,0,0);
    const compressed=await compressImg(cv.toDataURL("image/jpeg",.9),480,.75);
    if(sr.current)sr.current.getTracks().forEach(t=>t.stop());
    onCapture(compressed);onClose();
  }

  function close(){if(sr.current)sr.current.getTracks().forEach(t=>t.stop());onClose();}

  return e("div",{style:{position:"fixed",inset:0,background:"#000",zIndex:999,display:"flex",flexDirection:"column"}},
    flash&&e("div",{style:{position:"absolute",inset:0,background:"white",zIndex:10,opacity:.8,pointerEvents:"none"}}),
    e("div",{style:{background:"rgba(0,0,0,.7)",padding:"12px 16px",display:"flex",alignItems:"center",gap:12,color:"white",zIndex:2}},
      e("button",{onClick:close,style:{background:"rgba(255,255,255,.2)",border:"none",color:"white",width:36,height:36,borderRadius:10,cursor:"pointer",fontSize:18}},"✕"),
      e("div",null,
        e("div",{style:{fontWeight:700}},"📷 ถ่ายรูปสภาพผ้า"),
        name&&e("div",{style:{fontSize:12,opacity:.8}},name)
      )
    ),
    e("div",{style:{flex:1,position:"relative",overflow:"hidden"}},
      err?e("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",color:"white",padding:24,textAlign:"center"}},
        e("div",{style:{fontSize:48}},"📷"),
        e("div",{style:{color:"#fca5a5",fontSize:16,marginTop:12}},"กล้องไม่พร้อม"),
        e("div",{style:{opacity:.7,fontSize:13,margin:"8px 0 20px"}},err),
        e("div",{style:{background:"rgba(255,255,255,.1)",borderRadius:12,padding:14,fontSize:13,maxWidth:280,textAlign:"left"}},
          e("b",null,"💡 ใช้ปุ่ม '📁 เลือกรูป' แทน"),
          e("br"),
          "หรือ Deploy บน HTTPS ก่อน"
        ),
        e("button",{onClick:close,style:{marginTop:20,background:"#3b82f6",color:"white",border:"none",borderRadius:12,padding:"12px 28px",fontSize:15,fontWeight:700,cursor:"pointer"}},"ตกลง")
      ):e(React.Fragment,null,
        e("video",{ref:vr,playsInline:true,muted:true,style:{width:"100%",height:"100%",objectFit:"cover",display:"block"}}),
        !ready&&!err&&e("div",{style:{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",color:"white"}},
          e("div",{style:{textAlign:"center"}},e("div",{style:{fontSize:40}},"⏳"),e("div",null,"เปิดกล้อง..."))
        )
      )
    ),
    !err&&e("div",{style:{background:"rgba(0,0,0,.85)",padding:"20px 0 36px",display:"flex",alignItems:"center",justifyContent:"center",gap:24}},
      e("button",{onClick:close,style:{background:"rgba(255,255,255,.15)",border:"none",color:"white",width:52,height:52,borderRadius:"50%",cursor:"pointer",fontSize:22}},"✕"),
      e("button",{onClick:snap,disabled:!ready,style:{width:76,height:76,borderRadius:"50%",background:ready?"white":"#555",border:"4px solid rgba(255,255,255,.4)",cursor:ready?"pointer":"not-allowed",display:"flex",alignItems:"center",justifyContent:"center"}},
        e("div",{style:{width:54,height:54,borderRadius:"50%",background:ready?"#1f2937":"#444"}})
      ),
      e("div",{style:{width:52}})
    )
  );

function ApiSetupScr({notify,go,syncing,syncOk,setSyncing,setSyncOk}){
  const [url,setUrl]=useState(API_URL||'');
  const [testing,setTesting]=useState(false);
  const [testOk,setTestOk]=useState(null);

  async function test(){
    if(!url.trim()){notify("⚠️ กรุณาใส่ URL",false);return;}
    setTesting(true);setTestOk(null);
    try{
      const r=await fetch(url.trim()+'?action=ping',{method:'GET',redirect:'follow'});
      const j=await r.json();
      setTestOk(j.ok);
      notify(j.ok?"✅ เชื่อมต่อสำเร็จ!":"❌ API ตอบผิด",j.ok);
    }catch(err){setTestOk(false);notify("❌ "+err.message,false);}
    setTesting(false);
  }

  function save(){
    const u=url.trim();
    if(!u){notify("⚠️ กรุณาใส่ URL",false);return;}
    localStorage.setItem('hj9-api-url',u);
    API_URL=u;
    notify("✅ บันทึกแล้ว — กำลัง Refresh...");
    setTimeout(()=>location.reload(),1200);
  }

  function clear(){
    localStorage.removeItem('hj9-api-url');
    API_URL='';
    notify("🗑️ ลบ URL แล้ว");
    setTimeout(()=>location.reload(),1000);
  }

  const steps=[
    "เปิด Google Sheets → Extensions → Apps Script",
    "วาง code จากไฟล์ homjang68_appscript.gs",
    "Deploy → New Deployment → Web App",
    "Execute as: Me | Who has access: Anyone",
    "Copy URL → วางด้านล่าง",
  ];

  return e("div",{style:{padding:16}},
    e("div",{style:{background:"linear-gradient(135deg,#1e7e34,#28a745)",color:"white",borderRadius:18,padding:20,marginBottom:16,textAlign:"center"}},
      e("div",{style:{fontSize:40}},"☁️"),
      e("div",{style:{fontSize:20,fontWeight:700,marginTop:8}},"เชื่อมต่อ Google Sheets"),
      e("div",{style:{opacity:.85,fontSize:13,marginTop:4}},"ข้อมูลและรูปภาพ Sync ขึ้น Cloud อัตโนมัติ")
    ),
    e("div",{style:{background:"white",borderRadius:16,padding:16,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,.07)"}},
      e("div",{style:{fontWeight:700,marginBottom:10,color:"#1e7e34"}},"📋 วิธีติดตั้ง"),
      steps.map((step,i)=>e("div",{key:i,style:{display:"flex",gap:10,padding:"5px 0",fontSize:13,color:"#374151"}},
        e("div",{style:{width:22,height:22,borderRadius:"50%",background:"#28a745",color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0}},i+1),
        e("div",null,step)
      ))
    ),
    e("div",{style:{background:"white",borderRadius:16,padding:16,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,.07)"}},
      e("div",{style:{fontWeight:700,marginBottom:8,color:"#1e7e34"}},"🔗 Apps Script URL"),
      e("textarea",{value:url,onChange:ev=>setUrl(ev.target.value),rows:3,placeholder:"https://script.google.com/macros/s/.../exec",style:{width:"100%",border:"1.5px solid #d1fae5",borderRadius:10,padding:"10px 12px",fontSize:12,fontFamily:"monospace",resize:"none",outline:"none",background:"#f0fdf4"}}),
      e("div",{style:{display:"flex",gap:8,marginTop:10,alignItems:"center"}},
        e("button",{onClick:test,disabled:testing,style:{flex:1,background:testing?"#d1fae5":"#059669",color:"white",border:"none",borderRadius:10,padding:"10px 0",fontWeight:700,cursor:"pointer",fontSize:14}},testing?"⏳ กำลังทดสอบ...":"🔌 ทดสอบ"),
        testOk===true&&e("span",{style:{fontSize:22}},"✅"),
        testOk===false&&e("span",{style:{fontSize:22}},"❌")
      )
    ),
    e("button",{onClick:save,style:{background:"linear-gradient(135deg,#1e7e34,#28a745)",color:"white",border:"none",borderRadius:14,padding:"14px 0",fontSize:16,fontWeight:700,cursor:"pointer",width:"100%",marginBottom:10}},"💾 บันทึกและเชื่อมต่อ"),
    API_URL&&e("button",{onClick:clear,style:{background:"#fee2e2",color:"#dc2626",border:"1.5px solid #fca5a5",borderRadius:14,padding:"10px 0",fontSize:14,fontWeight:700,cursor:"pointer",width:"100%",marginBottom:10}},"🗑️ ยกเลิกการเชื่อมต่อ"),
    e("div",{style:{textAlign:"center",padding:"12px 0 24px",fontSize:12,color:"#9ca3af"}},"URL ปัจจุบัน: "+(API_URL?API_URL.slice(0,40)+"...":'ยังไม่ได้ตั้งค่า'))
  );
}
// ── RENDER ────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App, null));
</script>
</body>
</html>
