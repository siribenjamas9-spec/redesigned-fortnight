  if(!API_URL)return Promise.resolve(null);

  return Promise.race([
    fetch(API_URL+'?action='+action,{method:'GET',redirect:'follow'})

  ]).catch(()=>null);

async function compressImg(src,maxPx=480,q=0.75){
  return new Promise(resolve=>{
    function go(url){
      const img=new Image();
      img.onload=()=>{
        const sc=Math.min(1,maxPx/Math.max(img.width,img.height));
        const cv=document.createElement('canvas');
        cv.width=Math.floor(img.width*sc);cv.height=Math.floor(img.height*sc);
        cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
        resolve(cv.toDataURL('image/jpeg',q));
      };
      img.onerror=()=>resolve(src);
      img.src=url;
    }
    if(src instanceof File){const r=new FileReader();r.onload=e=>go(e.target.result);r.readAsDataURL(src);}
    else go(src);
  });
}

function planWash(classes,s){
  const pool=[];
  ['W27','W18','W14','W9'].forEach(t=>{for(let i=0;i<(s[t]||0);i++)pool.push({t,n:i+1,cap:WC[t]});});
  if(!pool.length||!classes.length)return[];
  const loads=[];let wave=1;const q=classes.map(c=>({...c}));
  while(q.length>0){
    const slots=pool.map(m=>({id:'W'+wave+'-'+m.t+m.n,wave,m,cls:[],tot:0,rem:m.cap}));
    let si=0;
    while(q.length>0&&si<slots.length){
      const sl=slots[si];
      if(sl.rem===0){si++;continue;}
      const take=Math.min(sl.rem,q[0].count);
      sl.cls.push({...q[0],count:take});sl.tot+=take;sl.rem-=take;q[0].count-=take;
      if(q[0].count===0)q.shift();
    }
    loads.push(...slots.filter(sl=>sl.tot>0));wave++;
  }
  return loads;
}
function planDry(wl,s){
  const pool=[];
  ['D25','D14'].forEach(t=>{for(let i=0;i<(s[t]||0);i++)pool.push({t,n:i+1,cap:DC[t],mpb:DM[t]});});
  if(!pool.length)return[];
  const loads=[];
  [...new Set(wl.map(l=>l.wave))].forEach(w=>{
    const items=[];
    wl.filter(l=>l.wave===w).forEach(wl2=>wl2.cls.forEach(c=>{for(let i=0;i<c.count;i++)items.push(c);}));
    let bi=0,di=0;
    while(bi<items.length){
      const dr=pool[di%pool.length];
      const batch=items.slice(bi,bi+dr.cap);
      const cm={};batch.forEach(c=>{cm[c.id]=cm[c.id]||{id:c.id,name:c.name,count:0};cm[c.id].count++;});
      loads.push({id:uid(),wave:w,dr,tot:batch.length,cls:Object.values(cm),dryMin:batch.length*dr.mpb});
      bi+=dr.cap;di++;
    }
  });
  return loads;
}
function planTime(total,wl,dl,s){
  const W=s.workers||3;
  const waves=wl.length?Math.max(...wl.map(l=>l.wave)):0;
  const mxW=wl.length?Math.max(...wl.map(l=>WT[l.m.t]||45)):45;
  const rec=Math.max(10,Math.round(total*0.3/W));
  const wash=waves*mxW+Math.max(0,waves-1)*5;
  const fold=Math.ceil(total*(s.fmb||1.5)/W);
  const sort=Math.ceil(total/15)*4+10;
  const steps=[
    {n:'รับผ้า+ถ่ายรูป',ic:'🚛',min:rec,note:W+'คน'},
    {n:'ใส่ผ้า+ซัก',ic:'🧺',min:wash,note:waves+'รอบ×'+mxW+'น.'},
    {n:'อบผ้า',ic:'💨',min:dl.length?Math.max(...dl.map(l=>l.dryMin)):0,note:'ซ้อนทับ'},
    {n:'พับผ้า',ic:'👕',min:fold,note:total+'÷'+W+'คน'},
    {n:'เรียงถุง+ขึ้นรถ',ic:'📦',min:sort,note:'Sequence ห้อง'},
  ];
  const totalMin=rec+wash+fold+sort;
  return{steps,totalMin};
}

  // Sync from Sheets in background

    ST.syncing=true;
    apiRead('getAll').then(cloud=>{
      if(cloud){
        if(cloud.jobs&&cloud.jobs.length>0){ST.jobs=cloud.jobs;LS.set('hj9-jobs',ST.jobs);}

        ST.syncOk=true;
      }else ST.syncOk=false;
      ST.syncing=false;
      render();
    }).catch(()=>{ST.syncing=false;ST.syncOk=false;render();});
  }
}

// ── TODAY ─────────────────────────────────────────────────────
function buildToday(){
  const active=ST.jobs.filter(j=>j.status!=='delivered');
  if(!active.length)return`<div style="text-align:center;padding:80px 20px"><div style="font-size:72px">🎉</div><div style="font-size:22px;font-weight:700;margin-top:12px;color:#059669">ไม่มีงานค้าง!</div></div>`;
  return`<div class="page">`+active.map(job=>{
    const si=SF.indexOf(job.status);
    const col=SC[job.status];
    const pct=((si+1)/SF.length)*100;
    const isLast=job.status==='delivered';
    return`<div class="card" style="border:2px solid ${col}40;margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div>

      </div>
      <div style="background:#f3f4f6;border-radius:8px;height:10px;margin-bottom:10px;overflow:hidden">
        <div style="height:100%;background:${col};border-radius:8px;width:${pct}%;transition:width .5s"></div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px">
        ${(job.classes||[]).map(c=>badgeHtml(c.id,c.count)).join('')}

      ${!isLast?`<button class="btn" onclick="advJob('${job.id}')" style="background:${job.status==='ready'?'linear-gradient(135deg,#0ea5e9,#06b6d4)':col};color:#fff">

// ── REVENUE ───────────────────────────────────────────────────
function buildRevenue(){
  const p=ST.revP||'month';
  const now=new Date();
  const filt=ST.jobs.filter(j=>{
    if(p==='today')return j.date===todayStr();
    if(p==='week')return(now-new Date(j.date+'T00:00:00'))/864e5<7;
    if(p==='month')return j.date&&j.date.startsWith(thisMonth());
    return true;
  }).sort((a,b)=>b.createdAt-a.createdAt);
  const tR=filt.reduce((a,j)=>a+(j.rev||0),0);
  const tB=filt.reduce((a,j)=>a+(j.tot||0),0);
  return`<div class="page">
    <div style="display:flex;gap:4px;margin-bottom:14px;background:#ede9fe;border-radius:14px;padding:4px">
      ${[['today','วันนี้'],['week','7วัน'],['month','เดือน'],['all','ทั้งหมด']].map(([k,l])=>`
      <button onclick="ST.revP='${k}';render()" style="flex:1;background:${p===k?'#7c3aed':'transparent'};color:${p===k?'#fff':'#7c3aed'};border:none;border-radius:10px;padding:8px 0;cursor:pointer;font-weight:700;font-size:13px;font-family:Kanit,sans-serif">${l}</button>`).join('')}

      ${[['💰','รายได้','฿'+tR.toLocaleString(),'#7c3aed'],['👕','ผ้า',tB+'ผืน','#059669'],['📋','งาน',''+filt.length,'#d97706'],['🚛','ส่ง',''+filt.filter(j=>j.status==='delivered').length,'#0891b2']].map(([ic,l,v,c])=>`
      <div class="card" style="text-align:center">
        <div style="font-size:26px">${ic}</div>
        <div style="font-weight:900;font-size:20px;color:${c};margin-top:6px">${v}</div>
        <div style="font-size:12px;color:#9ca3af;margin-top:2px">${l}</div>
      </div>`).join('')}
    </div>
    ${tB>0?`<div class="card" style="text-align:center;background:linear-gradient(135deg,#faf5ff,#ede9fe);margin-bottom:14px">
      <div style="font-size:13px;color:#7c3aed">เฉลี่ย/ผืน</div>
      <div style="font-size:34px;font-weight:900;color:#4c1d95">฿${(tR/tB).toFixed(1)}</div>
      <div style="font-size:12px;color:#a78bfa">ตั้ง ฿${ST.cfg.ppb}/ผืน</div>
    </div>`:''}

      <div style="font-weight:700;margin-bottom:10px;color:#4c1d95">รายการ</div>
      ${!filt.length?'<div style="text-align:center;color:#d1d5db;padding:20px 0">ไม่มีข้อมูล</div>':''}
      ${filt.map(j=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f3f4f6">
        <div>
          <div style="font-weight:700">${thd(j.date)}</div>
          <div style="display:flex;gap:3px;margin-top:2px">${(j.classes||[]).slice(0,6).map(c=>META[c.id]?`<span style="font-size:15px">${META[c.id].emoji}</span>`:'').join('')}</div>

        <div style="text-align:right">

function advJob(id){
  ST.jobs=ST.jobs.map(j=>{
    if(j.id!==id)return j;
    const ni=SF.indexOf(j.status)+1;
    if(ni>=SF.length)return j;
    return{...j,status:SF[ni],upd:Date.now()};
  });
  saveJobs();
  const nj=ST.jobs.find(j=>j.id===id);
  if(nj){if(API_URL)apiWrite('updateJobStatus',{id,status:nj.status});notify(SI[nj.status]+' '+SL[nj.status]);}
  render();
}

function njSelectAll(v){CLASSES.forEach(c=>ST.njSel[c.id]=v);render();}

function njGenPlan(){
  const sc=CLASSES.filter(c=>ST.njSel[c.id]&&+ST.njCnt[c.id]>0).map(c=>({id:c.id,name:c.name,count:+ST.njCnt[c.id]}));
  const total=sc.reduce((a,c)=>a+c.count,0);
  if(!total)return;
  const wl=planWash(sc.map(c=>({...c})),ST.cfg);
  const dl=planDry(wl,ST.cfg);
  const {steps,totalMin}=planTime(total,wl,dl,ST.cfg);
  ST.njPlan={wl,dl,steps,totalMin,total,sc,est:total*ST.cfg.ppb};
  render();
}

function njSaveJob(){
  if(!ST.njPlan)return;
  const job={id:uid(),date:todayStr(),status:'new',tot:ST.njPlan.total,rev:ST.njPlan.est,classes:ST.njPlan.sc,washLoads:ST.njPlan.wl,dryLoads:ST.njPlan.dl,createdAt:Date.now()};
  ST.jobs=[job,...ST.jobs];
  saveJobs();
  ST.njPlan=null;
  notify('✅ บันทึกงานเรียบร้อย!');
  go('today');
}

function saveCfgForm(){
  document.querySelectorAll('[data-cfg]').forEach(inp=>{
    const k=inp.dataset.cfg;
    const v=parseFloat(inp.value)||0;
    ST.cfg[k]=v;
  });
  saveCfg();
  notify('✅ บันทึกแล้ว');
}

function updStdField(cid,idx,field,val){
  if(!ST.stds[cid])return;
  ST.stds[cid][idx]={...ST.stds[cid][idx],[field]:val};
  saveStds();
  saveStudentApi(cid,idx);
}

function updStdCond(cid,idx,cond){
  if(!ST.stds[cid])return;
  ST.stds[cid][idx]={...ST.stds[cid][idx],condition:cond};
  saveStds();
  saveStudentApi(cid,idx);
  // Re-render student detail only
  const detail=document.querySelector('[data-std-name="'+cid+'-'+idx+'"]');
  if(detail){
    // Full re-render of student section for simplicity
    render();
  }else render();
}

function viewPhoto(cid,idx){
  const photo=getPhoto(cid,idx);
  if(!photo)return;
  const std=ST.stds[cid]&&ST.stds[cid][idx];
  ST.viewPh={src:photo,name:std?std.name:'',cond:std?COND[std.condition].l:''};
  render();
}

function delPhoto(cid,idx){
  savePhotoLocal(cid,idx,null);
  if(API_URL)apiWrite('deletePhoto',{classId:cid,idx});
  notify('🗑️ ลบรูปแล้ว');
  render();
}

async function filePhoto(cid,idx,input){
  const f=input.files&&input.files[0];
  if(!f)return;
  notify('⏳ กำลังบีบอัดรูป...');
  const compressed=await compressImg(f);
  savePhotoLocal(cid,idx,compressed);
  if(API_URL)apiWrite('savePhoto',{classId:cid,idx,base64:compressed});
  notify('📷 บันทึกรูปแล้ว!');
  render();
}

// New Job checkbox/number handlers — use event delegation
document.addEventListener('change',function(e){
  if(e.target.dataset.njCls){
    const cid=e.target.dataset.njCls;
    ST.njSel[cid]=e.target.checked;
    render();
  }
  if(e.target.dataset.njCnt){
    const cid=e.target.dataset.njCnt;
    const cl=cls(cid);
    ST.njCnt[cid]=Math.max(0,Math.min(cl?cl.s:99,+e.target.value||0));
    render();
  }
});

  const btn=document.getElementById('test-btn');
  const res=document.getElementById('test-result');
  if(btn)btn.textContent='⏳ กำลังทดสอบ...';
  fetch(url+'?action=ping',{method:'GET',redirect:'follow'})
    .then(r=>r.json()).then(j=>{
      if(res)res.textContent=j.ok?'✅':'❌';
      notify(j.ok?'✅ เชื่อมต่อสำเร็จ!':'❌ API ตอบผิดปกติ',j.ok);
      if(btn)btn.textContent='🔌 ทดสอบ';
    }).catch(err=>{
      if(res)res.textContent='❌';
      notify('❌ '+err.message,false);
      if(btn)btn.textContent='🔌 ทดสอบ';
    });
}
function saveApiUrl(){
  const url=(document.getElementById('api-url-input')||{value:''}).value.trim();
  if(!url){notify('⚠️ กรุณาใส่ URL',false);return;}
  API_URL=url;localStorage.setItem('hj9-api-url',url);
  notify('✅ บันทึกแล้ว — กำลัง Refresh...');
  setTimeout(()=>location.reload(),1200);
}
function clearApiUrl(){
  localStorage.removeItem('hj9-api-url');API_URL='';
  notify('🗑️ ลบ URL แล้ว');setTimeout(()=>location.reload(),1000);
}

// ── CAMERA ────────────────────────────────────────────────────
let camStream=null;
function openCamera(cid,idx){
  closeCameraModal();
  const modal=document.createElement('div');
  modal.id='cam-modal';
  modal.style.cssText='position:fixed;inset:0;background:#000;z-index:999;display:flex;flex-direction:column';
  modal.innerHTML=`
    <div style="background:rgba(0,0,0,.7);padding:12px 16px;display:flex;align-items:center;gap:12px;color:#fff">
      <button onclick="closeCameraModal()" style="background:rgba(255,255,255,.2);border:none;color:#fff;width:36px;height:36px;border-radius:10px;cursor:pointer;font-size:18px;font-family:Kanit,sans-serif">✕</button>
      <div><div style="font-weight:700;font-family:Kanit,sans-serif">📷 ถ่ายรูปสภาพผ้า</div></div>
    </div>
    <div style="flex:1;position:relative;overflow:hidden">
      <video id="cam-video" playsinline muted style="width:100%;height:100%;object-fit:cover;display:block"></video>
      <div id="cam-err" style="display:none;position:absolute;inset:0;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px">
        <div style="font-size:48px">📷</div>
        <div style="color:#fca5a5;font-size:16px;margin-top:12px">กล้องไม่พร้อม</div>
        <div style="opacity:.7;font-size:13px;margin:8px 0 20px">ใช้ปุ่ม 📁 เลือกรูป แทนได้ครับ</div>
        <button onclick="closeCameraModal()" style="background:#3b82f6;color:#fff;border:none;border-radius:12px;padding:12px 28px;font-size:15px;font-weight:700;cursor:pointer;font-family:Kanit,sans-serif">ตกลง</button>
      </div>
    </div>
    <div style="background:rgba(0,0,0,.85);padding:20px 0 36px;display:flex;align-items:center;justify-content:center;gap:24px">
      <button onclick="closeCameraModal()" style="background:rgba(255,255,255,.15);border:none;color:#fff;width:52px;height:52px;border-radius:50%;cursor:pointer;font-size:22px">✕</button>
      <button id="cam-snap" onclick="snapPhoto('${cid}',${idx})" style="width:76px;height:76px;border-radius:50%;background:#fff;border:4px solid rgba(255,255,255,.4);cursor:pointer;display:flex;align-items:center;justify-content:center">
        <div style="width:54px;height:54px;border-radius:50%;background:#1f2937"></div>
      </button>
      <div style="width:52px"></div>
    </div>`;
  document.body.appendChild(modal);
  if(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia){
    navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280}}})
      .then(stream=>{
        camStream=stream;
        const v=document.getElementById('cam-video');
        if(v){v.srcObject=stream;v.play();}
      })
      .catch(err=>{
        const errDiv=document.getElementById('cam-err');
        if(errDiv)errDiv.style.display='flex';
        const v=document.getElementById('cam-video');
        if(v)v.style.display='none';
      });
  }else{
    const errDiv=document.getElementById('cam-err');
    if(errDiv)errDiv.style.display='flex';
  }
}
async function snapPhoto(cid,idx){
  const v=document.getElementById('cam-video');
  if(!v||!camStream)return;
  const cv=document.createElement('canvas');
  cv.width=v.videoWidth;cv.height=v.videoHeight;
  cv.getContext('2d').drawImage(v,0,0);
  const compressed=await compressImg(cv.toDataURL('image/jpeg',.9));
  closeCameraModal();
  savePhotoLocal(cid,idx,compressed);
  if(API_URL)apiWrite('savePhoto',{classId:cid,idx,base64:compressed});
  notify('📷 บันทึกรูปแล้ว!');
  render();
}
f

function closeCameraModal(){
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
  const m=document.getElementById('cam-modal');
  if(m)m.remove();
}

  try{

  }
}

init();
