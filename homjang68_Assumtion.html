/* ── IMAGE COMPRESS ── */
async function compressImg(src,maxPx=400,q=0.7){
  return new Promise(resolve=>{
    function go(url){const img=new Image();img.onload=()=>{const sc=Math.min(1,maxPx/Math.max(img.width,img.height));const cv=document.createElement("canvas");cv.width=Math.floor(img.width*sc);cv.height=Math.floor(img.height*sc);cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);resolve(cv.toDataURL("image/jpeg",q));};img.src=url;}
    if(src instanceof File){const rd=new FileReader();rd.onload=e=>go(e.target.result);rd.readAsDataURL(src);}else go(src);
  });
}

/* ── PLANNING ── */
function planWash(classes,s){
  const pool=[];["W27","W18","W14","W9"].forEach(t=>{for(let i=0;i<(s[t]||0);i++)pool.push({t,n:i+1,cap:WC[t]});});
  if(!pool.length||!classes.length)return[];
  const loads=[];let wave=1;const q=classes.map(c=>({...c}));
  while(q.length>0){
    const slots=pool.map(m=>({id:`W${wave}-${m.t}${m.n}`,wave,m,cls:[],tot:0,rem:m.cap}));
    let si=0;
    while(q.length>0&&si<slots.length){const sl=slots[si];if(sl.rem===0){si++;continue;}const take=Math.min(sl.rem,q[0].count);sl.cls.push({...q[0],count:take});sl.tot+=take;sl.rem-=take;q[0].count-=take;if(q[0].count===0)q.shift();}
    loads.push(...slots.filter(sl=>sl.tot>0));wave++;
  }
  return loads;
}
function planDry(wl,s){
  const pool=[];["D25","D14"].forEach(t=>{for(let i=0;i<(s[t]||0);i++)pool.push({t,n:i+1,cap:DC[t],mpb:DM[t]});});
  if(!pool.length)return[];
  const loads=[];[...new Set(wl.map(l=>l.wave))].forEach(w=>{
    const items=[];wl.filter(l=>l.wave===w).forEach(wl=>wl.cls.forEach(c=>{for(let i=0;i<c.count;i++)items.push(c);}));
    let bi=0,di=0;while(bi<items.length){const dr=pool[di%pool.length];const batch=items.slice(bi,bi+dr.cap);const cm={};batch.forEach(c=>{cm[c.id]={id:c.id,name:c.name,count:(cm[c.id]?.count||0)+1};});loads.push({id:uid(),wave:w,dr,tot:batch.length,cls:Object.values(cm),dryMin:batch.length*dr.mpb});bi+=dr.cap;di++;}
  });
  return loads;
}
function planTime(total,wl,dl,s){
  const W=s.workers||3;const waves=wl.length?Math.max(...wl.map(l=>l.wave)):0;const mxW=wl.length?Math.max(...wl.map(l=>WT[l.m.t]||45)):45;
  const mxD=dl.length?Math.max(...dl.map(l=>l.dryMin)):0;const dW=dl.length?[...new Set(dl.map(l=>l.wave))].length:0;
  const rec=Math.max(10,Math.round(total*0.3/W));const wash=waves*mxW+Math.max(0,waves-1)*5;const fold=Math.ceil(total*(s.fmb||1.5)/W);const sort=Math.ceil(total/15)*4+10;
  const steps=[{n:"รับผ้า+ถ่ายรูปสภาพ",ic:"🚛",min:rec,note:`${W}คน`,cum:rec},{n:"ใส่ผ้า+ซัก",ic:"🧺",min:wash,note:`${waves}รอบ×${mxW}น.`,cum:rec+wash},{n:"อบผ้า(Overlap)",ic:"💨",min:dW?mxD+(dW-1)*5:0,note:"ซ้อนทับ",cum:rec+wash},{n:"พับผ้า",ic:"👕",min:fold,note:`${total}÷${W}คน`,cum:rec+wash+fold},{n:"เรียงถุง+ขึ้นรถ",ic:"📦",min:sort,note:"Sequence ห้อง",cum:rec+wash+fold+sort}];
  return{steps,totalMin:steps[steps.length-1].cum};
}

/* ── CAMERA MODAL ── */
function CameraModal({onCapture,onClose,name}){
  const vr=useRef(null);const sr=useRef(null);const [ready,setReady]=useState(false);const [err,setErr]=useState("");const [flash,setFlash]=useState(false);
  useEffect(()=>{
    let ok=true;
    navigator.mediaDevices?.getUserMedia({video:{facingMode:{ideal:"environment"},width:{ideal:1280}}}).then(stream=>{
      if(!ok){stream.getTracks().forEach(t=>t.stop());return;}
      sr.current=stream;if(vr.current){vr.current.srcObject=stream;vr.current.onloadedmetadata=()=>{vr.current.play();setReady(true);};}
    }).catch(e=>setErr(e.message||"ไม่สามารถเปิดกล้องได้"));
    return()=>{ok=false;sr.current?.getTracks().forEach(t=>t.stop());};
  },[]);
  async function snap(){if(!vr.current||!ready)return;setFlash(true);setTimeout(()=>setFlash(false),180);const cv=document.createElement("canvas");cv.width=vr.current.videoWidth;cv.height=vr.current.videoHeight;cv.getContext("2d").drawImage(vr.current,0,0);const c=await compressImg(cv.toDataURL("image/jpeg",.9),480,.75);sr.current?.getTracks().forEach(t=>t.stop());onCapture(c);onClose();}
  function close(){sr.current?.getTracks().forEach(t=>t.stop());onClose();}
  return(
    <div style={{position:"fixed",inset:0,background:"#000",zIndex:999,display:"flex",flexDirection:"column"}}>
      {flash&&<div style={{position:"absolute",inset:0,background:"white",zIndex:10,opacity:.8,pointerEvents:"none"}}/>}
      <div style={{background:"rgba(0,0,0,.7)",padding:"12px 16px",display:"flex",alignItems:"center",gap:12,color:"white",zIndex:2}}>
        <button onClick={close} style={{background:"rgba(255,255,255,.2)",border:"none",color:"white",width:36,height:36,borderRadius:10,cursor:"pointer",fontSize:18}}>✕</button>
        <div><div style={{fontWeight:700}}>📷 ถ่ายรูปสภาพผ้า</div>{name&&<div style={{fontSize:12,opacity:.8}}>{name}</div>}</div>
      </div>
      <div style={{flex:1,position:"relative",overflow:"hidden"}}>
        {err?(<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",color:"white",padding:24,textAlign:"center"}}>
          <div style={{fontSize:48}}>📷</div><div style={{color:"#fca5a5",fontSize:16,marginTop:12}}>กล้องไม่พร้อม</div>
          <div style={{opacity:.7,fontSize:13,margin:"8px 0 20px"}}>{err}</div>
          <div style={{background:"rgba(255,255,255,.1)",borderRadius:12,padding:14,fontSize:13,maxWidth:280,textAlign:"left"}}>
            <b>💡 ใช้ปุ่ม "📁 เลือกรูป" แทน</b><br/>หรือ Deploy บน HTTPS (GitHub Pages/Netlify)
          </div>
          <button onClick={close} style={{marginTop:20,background:"#3b82f6",color:"white",border:"none",borderRadius:12,padding:"12px 28px",fontSize:15,fontWeight:700,cursor:"pointer"}}>ตกลง</button>
        </div>):(
          <><video ref={vr} playsInline muted style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
          {!ready&&!err&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",color:"white"}}><div style={{textAlign:"center"}}><div style={{fontSize:40}}>⏳</div><div>เปิดกล้อง...</div></div></div>}</>
        )}
      </div>
      {!err&&<div style={{background:"rgba(0,0,0,.85)",padding:"20px 0 36px",display:"flex",alignItems:"center",justifyContent:"center",gap:24}}>
        <button onClick={close} style={{background:"rgba(255,255,255,.15)",border:"none",color:"white",width:52,height:52,borderRadius:"50%",cursor:"pointer",fontSize:22}}>✕</button>
        <button onClick={snap} disabled={!ready} style={{width:76,height:76,borderRadius:"50%",background:ready?"white":"#555",border:"4px solid rgba(255,255,255,.4)",cursor:ready?"pointer":"not-allowed",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{width:54,height:54,borderRadius:"50%",background:ready?"#1f2937":"#444"}}/>
        </button>
        <div style={{width:52}}/>
      </div>}
    </div>
  );
}

/* ── STUDENT CARD ── */
function StudentCard({cid,idx,std,photo,onUpdate,onPhoto,onView}){
  const m=META[cid];const [cam,setCam]=useState(false);const cond=COND[std.condition]||COND.good;const iid=`ph-${cid}-${idx}`;
  async function onFile(e){const f=e.target.files?.[0];if(!f)return;onPhoto(await compressImg(f));e.target.value="";}
  return(<>
    {cam&&<CameraModal name={std.name||`คนที่${idx+1}`} onCapture={async d=>onPhoto(d)} onClose={()=>setCam(false)}/>}
    <div style={{background:"white",borderRadius:16,marginBottom:10,overflow:"hidden",boxShadow:"0 2px 10px rgba(0,0,0,.07)",border:`1.5px solid ${m.color}20`,animation:"fadeUp .2s ease"}}>
      <div style={{background:`${m.color}14`,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:28,height:28,borderRadius:"50%",background:m.color,color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:13,flexShrink:0}}>{idx+1}</div>
        <input value={std.name} onChange={e=>onUpdate({name:e.target.value})} placeholder={`ชื่อนักเรียนคนที่ ${idx+1}`} style={{flex:1,border:"none",background:"transparent",fontSize:15,fontWeight:std.name?700:400,color:std.name?m.dark:"#9ca3af",outline:"none"}}/>
        <span style={{fontSize:18}}>{cond.i}</span>
      </div>
      <div style={{padding:"10px 14px"}}>
        <div style={{display:"flex",gap:5,marginBottom:10}}>
          <span style={{fontSize:12,color:"#9ca3af",alignSelf:"center",flexShrink:0}}>สภาพ:</span>
          {Object.entries(COND).map(([k,v])=><button key={k} className="btn" onClick={()=>onUpdate({condition:k})} style={{flex:1,background:std.condition===k?v.c:"#f9fafb",color:std.condition===k?"white":"#6b7280",border:`1.5px solid ${std.condition===k?v.c:"#e5e7eb"}`,borderRadius:10,padding:"6px 0",fontSize:13,fontWeight:700,cursor:"pointer"}}>{v.i} {v.l}</button>)}
        </div>
        {(std.condition!=="good"||std.note)&&<input value={std.note||""} onChange={e=>onUpdate({note:e.target.value})} placeholder="หมายเหตุ เช่น มีรอยเปื้อน ขวาล่าง" style={{width:"100%",border:"1.5px solid #fde68a",borderRadius:10,padding:"7px 12px",fontSize:13,background:"#fffbeb",color:"#92400e",marginBottom:10,outline:"none",fontFamily:"'Kanit',sans-serif"}}/>}
        <div style={{display:"flex",gap:10,alignItems:"stretch"}}>
          <div style={{flexShrink:0}}>
            {photo?(<div style={{position:"relative"}}><img src={photo} alt="" onClick={()=>onView(photo,std.name,cond.l)} style={{width:84,height:84,objectFit:"cover",borderRadius:12,cursor:"pointer",border:`2px solid ${m.color}50`,display:"block"}}/><button onClick={()=>onPhoto(null)} style={{position:"absolute",top:-6,right:-6,width:20,height:20,borderRadius:"50%",background:"#ef4444",color:"white",border:"2px solid white",cursor:"pointer",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button></div>
            ):(<div style={{width:84,height:84,borderRadius:12,border:`2px dashed ${m.color}60`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:m.bg}}><div style={{fontSize:26,color:m.color}}>📷</div><div style={{fontSize:10,color:m.color,marginTop:2}}>ไม่มีรูป</div></div>)}
          </div>
          <div style={{flex:1,display:"flex",flexDirection:"column",gap:6}}>
            <button className="btn" onClick={()=>setCam(true)} style={{background:`linear-gradient(135deg,${m.color},${m.dark})`,color:"white",border:"none",borderRadius:11,padding:"9px 0",fontSize:14,fontWeight:700,cursor:"pointer",flex:1}}>📷 เปิดกล้อง</button>
            <label htmlFor={iid} style={{display:"block",background:"#f5f3ff",color:"#7c3aed",border:"1.5px solid #e9d5ff",borderRadius:11,padding:"8px 0",fontSize:13,fontWeight:700,cursor:"pointer",textAlign:"center"}}>
              📁 เลือกรูป<input id={iid} type="file" accept="image/*" onChange={onFile} style={{display:"none"}}/>
            </label>
            {photo&&<button className="btn" onClick={()=>onView(photo,std.name,cond.l)} style={{background:"#f0fdf4",color:"#059669",border:"1.5px solid #bbf7d0",borderRadius:11,padding:"7px 0",fontSize:13,fontWeight:700,cursor:"pointer"}}>🔍 ดูรูปใหญ่</button>}
          </div>
        </div>
      </div>
    </div>
  </>);
}

  const [scr,go]=useState("home");
  const [jobs,setJobs]=useState([]);
  const [cfg,setCfg]=useState(DEF);
  const [stds,setStds]=useState(defStd());
  const [photos,setPhotos]=useState({});
  const [actCls,setActCls]=useState(null);
  const [toast,setToast]=useState(null);
  const [viewPh,setViewPh]=useState(null);

  useEffect(()=>{
    const r1=S.get("hj8-jobs");if(r1)try{setJobs(JSON.parse(r1.value));}catch{}
    const r2=S.get("hj8-cfg"); if(r2)try{setCfg({...DEF,...JSON.parse(r2.value)});}catch{}
    const r3=S.get("hj8-std"); if(r3)try{setStds({...defStd(),...JSON.parse(r3.value)});}catch{}
  },[]);

  useEffect(()=>{
    if(!actCls)return;
    const cls=CLASSES.find(c=>c.id===actCls);const np={};
    Array.from({length:cls.s},(_,i)=>{const r=S.get(`hj8-ph-${actCls}-${i}`);if(r)np[`${actCls}-${i}`]=r.value;});
    setPhotos(np);
  },[actCls]);

  const saveJobs=j=>{setJobs(j);S.set("hj8-jobs",JSON.stringify(j));};
  const saveCfg=c=>{setCfg(c);S.set("hj8-cfg",JSON.stringify(c));};
  const saveStds=st=>{setStds(st);S.set("hj8-std",JSON.stringify(st));};
  function savePhoto(cid,idx,data){
    const k=`${cid}-${idx}`;
    if(!data){S.del(`hj8-ph-${cid}-${idx}`);setPhotos(p=>{const n={...p};delete n[k];return n;});notify("🗑️ ลบรูปแล้ว");return;}

  return(<div style={{padding:16}}>
    <Card style={{background:"linear-gradient(135deg,#4c1d95,#7c3aed)",color:"white"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:12,opacity:.8}}>ผ้าวันนี้</div><div style={{fontSize:40,fontWeight:900,lineHeight:1}}>{total}<span style={{fontSize:18,fontWeight:400}}> ผืน</span></div></div><div style={{textAlign:"right"}}><div style={{fontSize:12,opacity:.8}}>รายได้</div><div style={{fontSize:28,fontWeight:700}}>฿{(total*cfg.ppb).toLocaleString()}</div></div></div>
    </Card>
    <div style={{display:"flex",gap:8,marginBottom:14}}>
      <button className="btn" onClick={()=>{const m={};CLASSES.forEach(c=>m[c.id]=true);setSel(m);}} style={{flex:1,background:"#059669",color:"white",border:"none",borderRadius:12,padding:"10px 0",fontWeight:700,cursor:"pointer"}}>✅ ทั้งหมด</button>
      <button className="btn" onClick={()=>setSel({})} style={{flex:1,background:"#fff",border:"1.5px solid #e5e7eb",borderRadius:12,padding:"10px 0",cursor:"pointer",color:"#6b7280"}}>❌ ยกเลิก</button>
    </div>
    {LVLS.map(lv=>{const lvc=CLASSES.filter(c=>c.name.startsWith(lv));const lt=lvc.filter(c=>sel[c.id]).reduce((a,c)=>a+(+cnt[c.id]||0),0);const col=LCOL[lv];return(
      <Card key={lv} style={{borderLeft:`4px solid ${col}`,marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><span style={{fontWeight:700,color:col,fontSize:16}}>ชั้น {lv}</span><span style={{background:col+"20",borderRadius:8,padding:"2px 12px",color:col,fontWeight:700}}>{lt}ผืน</span></div>
        {lvc.map(c=>{const m=META[c.id];return(<div key={c.id} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:"1px solid #f3f4f6"}}>
          <input type="checkbox" checked={!!sel[c.id]} onChange={e=>setSel(s=>({...s,[c.id]:e.target.checked}))} style={{width:20,height:20,cursor:"pointer",accentColor:m?.color}}/>
          <span style={{fontSize:18}}>{m?.emoji}</span>
          <span style={{flex:1,fontSize:15,color:sel[c.id]?"#1f2937":"#d1d5db",fontWeight:sel[c.id]?600:400}}>{c.name}</span>
          <span style={{color:"#e5e7eb",fontSize:11}}>max{c.s}</span>
          <input type="number" min={0} max={c.s} value={cnt[c.id]||0} onChange={e=>setCnt(p=>({...p,[c.id]:Math.min(c.s,Math.max(0,+e.target.value||0))}))} disabled={!sel[c.id]} style={{width:54,textAlign:"center",border:`1.5px solid ${sel[c.id]?m?.color+"60":"#e5e7eb"}`,borderRadius:10,padding:"5px 0",fontSize:15,background:sel[c.id]?"#fff":"#f9fafb",color:sel[c.id]?"#1f2937":"#d1d5db",fontWeight:600}}/>
        </div>);})}
      </Card>
    );})}
    <button className="btn" onClick={gen} disabled={!total} style={{background:total?"linear-gradient(135deg,#7c3aed,#a855f7)":"#e5e7eb",color:total?"white":"#9ca3af",border:"none",borderRadius:16,padding:"14px 0",fontSize:17,fontWeight:700,cursor:total?"pointer":"not-allowed",width:"100%",marginBottom:24}}>⚡ สร้างแผนงาน ({total}ผืน)</button>
  </div>);
}

/* ── REVENUE ── */
function RevenueScr({jobs,cfg}){
  const [p,setP]=useState("month");const now=new Date();
  const f=jobs.filter(j=>{if(p==="today")return j.date===todayStr();if(p==="week")return(now-new Date(j.date+"T00:00:00"))/864e5<7;if(p==="month")return j.date?.startsWith(thisMonth());return true;}).sort((a,b)=>b.createdAt-a.createdAt);
  const tR=f.reduce((a,j)=>a+(j.rev||0),0);const tB=f.reduce((a,j)=>a+(j.tot||0),0);
  return(<div style={{padding:16}}>
    <div style={{display:"flex",gap:4,marginBottom:14,background:"#ede9fe",borderRadius:14,padding:4}}>{[["today","วันนี้"],["week","7วัน"],["month","เดือน"],["all","ทั้งหมด"]].map(([k,l])=><button key={k} onClick={()=>setP(k)} style={{flex:1,background:p===k?"#7c3aed":"transparent",color:p===k?"white":"#7c3aed",border:"none",borderRadius:10,padding:"8px 0",cursor:"pointer",fontWeight:700,fontSize:13}}>{l}</button>)}</div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>{[["💰","รายได้",`฿${tR.toLocaleString()}`,"#7c3aed"],["👕","ผ้า",`${tB}ผืน`,"#059669"],["📋","งาน",`${f.length}`,"#d97706"],["🚛","ส่ง",`${f.filter(j=>j.status==="delivered").length}`,"#0891b2"]].map(([ic,l,v,c])=><div key={l} style={{background:"white",borderRadius:16,padding:14,boxShadow:"0 2px 10px rgba(0,0,0,.07)",textAlign:"center"}}><div style={{fontSize:26}}>{ic}</div><div style={{fontWeight:900,fontSize:20,color:c,marginTop:6}}>{v}</div><div style={{fontSize:12,color:"#9ca3af",marginTop:2}}>{l}</div></div>)}</div>
    {tB>0&&<Card style={{textAlign:"center",background:"linear-gradient(135deg,#faf5ff,#ede9fe)",marginBottom:14}}><div style={{fontSize:13,color:"#7c3aed"}}>เฉลี่ย/ผืน</div><div style={{fontSize:34,fontWeight:900,color:"#4c1d95"}}>฿{(tR/tB).toFixed(1)}</div><div style={{fontSize:12,color:"#a78bfa"}}>ตั้ง ฿{cfg.ppb}/ผืน</div></Card>}
    <Card><div style={{fontWeight:700,marginBottom:10,color:"#4c1d95"}}>รายการ</div>{!f.length&&<div style={{textAlign:"center",color:"#d1d5db",padding:"20px 0"}}>ไม่มีข้อมูล</div>}{f.map(j=><div key={j.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid #f3f4f6"}}><div><div style={{fontWeight:700}}>{thd(j.date)}</div><div style={{display:"flex",gap:3,marginTop:2}}>{j.classes?.slice(0,6).map(c=><span key={c.id} style={{fontSize:15}}>{META[c.id]?.emoji}</span>)}</div></div><div style={{textAlign:"right"}}><div style={{fontWeight:700,color:"#059669"}}>฿{(j.rev||0).toLocaleString()}</div><span style={{fontSize:11,background:SC[j.status]+"25",color:SC[j.status],borderRadius:6,padding:"2px 8px",fontWeight:700}}>{SI[j.status]}</span></div></div>)}</Card>
  </div>);
}

/* ── DASHBOARD ── */
function DashScr({jobs,mRev,mBl,active}){
  const T=80000;const pct=Math.min(100,(mRev/T)*100);const byS={};SF.forEach(s=>byS[s]=jobs.filter(j=>j.status===s).length);
  return(<div style={{padding:16}}>
    <Card style={{background:"linear-gradient(135deg,#4c1d95,#7c3aed,#a855f7)",color:"white",textAlign:"center",padding:20}}>
      <div style={{fontSize:13,opacity:.8}}>รายได้เดือนนี้</div><div style={{fontSize:48,fontWeight:900,margin:"8px 0",lineHeight:1}}>฿{(mRev/1000).toFixed(1)}K</div>
      <div style={{background:"rgba(255,255,255,.25)",borderRadius:8,height:16,margin:"10px 0",overflow:"hidden"}}><div style={{height:"100%",background:"linear-gradient(90deg,#34d399,#fbbf24)",borderRadius:8,width:`${pct}%`,transition:"width .8s"}}/></div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:13}}><span style={{opacity:.8}}>{pct.toFixed(1)}%</span><span style={{opacity:.8}}>เป้า ฿{(T/1000)}K</span></div>
    </Card>
    <Card><div style={{fontWeight:700,fontSize:16,marginBottom:12,color:"#4c1d95"}}>📊 สถานะงาน</div>{SF.map(s=><div key={s} style={{display:"flex",alignItems:"center",gap:12,padding:"7px 0",borderBottom:"1px solid #f3f4f6"}}><span style={{fontSize:20}}>{SI[s]}</span><span style={{flex:1,fontSize:15}}>{SL[s]}</span><span style={{background:SC[s]+"25",color:SC[s],fontWeight:700,borderRadius:8,padding:"3px 14px"}}>{byS[s]||0}</span></div>)}</Card>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>{[["ผ้า/เดือน",`${mBl}ผืน`,"#059669"],["งานค้าง",`${active.length}งาน`,"#ef4444"],["นักเรียน",`${TOTAL}คน`,"#7c3aed"],["15ห้องเรียน",CLASSES.map(c=>META[c.id].emoji).slice(0,8).join(""),"#d97706"]].map(([l,v,c])=><div key={l} style={{background:"white",borderRadius:14,padding:"14px",boxShadow:"0 2px 8px rgba(0,0,0,.07)",textAlign:"center"}}><div style={{fontWeight:900,fontSize:v.length>8?14:20,color:c}}>{v}</div><div style={{fontSize:12,color:"#9ca3af",marginTop:4}}>{l}</div></div>)}</div>
  </div>);
}

/* ── SETTINGS ── */
function SettingsScr({cfg,saveCfg,notify}){
  const [s,set]=useState({...cfg});const save=()=>{saveCfg(s);notify("✅ บันทึกแล้ว");};const upd=(k,v)=>set(p=>({...p,[k]:v}));
  function NR({k,label,min=0,max=20,step=1,unit=""}){return<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #f3f4f6"}}><span style={{fontSize:15}}>{label}{unit&&<span style={{fontSize:12,color:"#c4b5fd"}}> {unit}</span>}</span><input type="number" value={s[k]||0} min={min} max={max} step={step} onChange={e=>upd(k,Math.max(min,Math.min(max,+e.target.value||0)))} style={{width:70,textAlign:"center",border:"1.5px solid #e9d5ff",borderRadius:10,padding:"6px 8px",fontSize:15,fontWeight:700,color:"#4c1d95",background:"#faf5ff"}}/></div>;}
  return(<div style={{padding:16}}>
    <Card><div style={{fontWeight:700,color:"#5b21b6",marginBottom:4}}>💰 ราคา</div><NR k="ppb" label="ราคาต่อผืน" min={1} max={999} step={5} unit="฿"/></Card>
    <Card><div style={{fontWeight:700,color:"#5b21b6",marginBottom:4}}>🧺 เครื่องซัก</div><NR k="W27" label="ตู้ 27Kg(18ผืน)"/><NR k="W18" label="ตู้ 18Kg(13ผืน)"/><NR k="W14" label="ตู้ 14Kg(8ผืน)"/><NR k="W9" label="ตู้ 9Kg(6ผืน)"/></Card>
    <Card><div style={{fontWeight:700,color:"#5b21b6",marginBottom:4}}>💨 เครื่องอบ</div><NR k="D25" label="ตู้อบ 25Kg(2น./ผืน)"/><NR k="D14" label="ตู้อบ 14Kg(3น./ผืน)"/></Card>
    <Card><div style={{fontWeight:700,color:"#5b21b6",marginBottom:4}}>👥 การทำงาน</div><NR k="workers" label="พนักงาน" min={1} max={10} unit="คน"/><NR k="fmb" label="เวลาพับ/ผืน" min={0.5} max={5} step={0.25} unit="น."/></Card>
    <Card style={{background:"#faf5ff",border:"1.5px solid #e9d5ff"}}><div style={{fontWeight:700,color:"#5b21b6",marginBottom:6}}>📊 ความจุต่อรอบ</div><div style={{fontSize:14,color:"#6b7280"}}>ซัก: <b style={{color:"#4c1d95"}}>{(s.W27||0)*18+(s.W18||0)*13+(s.W14||0)*8+(s.W9||0)*6}ผืน</b> | อบ: <b style={{color:"#4c1d95"}}>{(s.D25||0)*17+(s.D14||0)*8}ผืน</b></div></Card>
    <button className="btn" onClick={save} style={{background:"linear-gradient(135deg,#7c3aed,#a855f7)",color:"white",border:"none",borderRadius:16,padding:"14px 0",fontSize:17,fontWeight:700,cursor:"pointer",width:"100%",marginBottom:24}}>💾 บันทึก</button>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
